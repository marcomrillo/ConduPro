{% extends "base.html" %}

{% block content %}

<div class="auth-card">

    <h2 class="auth-card-title">Iniciar Sesión</h2>
    <p class="auth-card-sub">Ingresa tus credenciales para continuar</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post" class="form-box">

        <label>Correo:</label>
        <input type="email" name="correo" placeholder="tu@correo.com" required>

        <label>Password:</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn-primary btn-full">
            Ingresar
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

    </form>

    <p class="auth-footer-link">¿No tienes cuenta? <a href="/registro">Registrarse</a></p>

</div>

{% endblock %}
