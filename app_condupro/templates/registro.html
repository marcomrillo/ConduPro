{% extends "base.html" %}

{% block content %}

<div class="auth-card">

    <h2 class="auth-card-title">Registro</h2>
    <p class="auth-card-sub">Completa los datos para crear tu cuenta</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/registrar" method="post" class="form-box">

        <label>Nombre:</label>
        <input type="text" name="nombre" placeholder="Juan Pérez" required>

        <label>Correo:</label>
        <input type="email" name="correo" placeholder="tu@correo.com" required>

        <label>Password:</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn-primary btn-full">
            Registrarse
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

    </form>

    <p class="auth-footer-link">¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a></p>

</div>

{% endblock %}
